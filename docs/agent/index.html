<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.ontostandard.org https://api.x.ai https://api.openai.com https://api.anthropic.com https://api.deepseek.com https://api.mistral.ai; frame-ancestors 'none'">
<title>ONTO — AI that cites its sources</title>
<meta name="description" content="Ask anything. Every answer is verified, sourced, and scored. Free AI assistant with epistemic discipline.">
<link rel="manifest" href="/agent/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONTO">
<link rel="apple-touch-icon" href="/agent/icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='17' fill='white'/%3E%3Cpath d='M16 10L20 10L20 26L16 26L16 14L13 14L13 10L16 10Z' fill='%230a0a0a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border-h:#3a3a3a;
  --text:#f0f0f0;--text2:#999;--text3:#666;
  --green:#22c55e;--green-d:#15803d;--green-bg:rgba(34,197,94,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --orange:#f59e0b;--blue:#60a5fa;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --max:720px;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.65;display:flex;flex-direction:column}
::selection{background:var(--green);color:#000}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:4px}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(10,10,10,.9);backdrop-filter:blur(16px);z-index:20}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-weight:700;font-size:16px;letter-spacing:-.3px}
.logo svg{width:24px;height:24px}
.hdr-actions{display:flex;align-items:center;gap:6px}
.hdr-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.hdr-btn:hover{border-color:var(--border-h);color:var(--text)}
.hdr-btn svg{width:14px;height:14px;opacity:.6}
.lang-sel{font-family:var(--mono);font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 8px;border-radius:6px;cursor:pointer;outline:none;color-scheme:dark}

/* ── CHAT AREA ── */
.chat{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.chat-inner{max-width:var(--max);width:100%;margin:0 auto;padding:20px;flex:1;display:flex;flex-direction:column}

/* ── WELCOME ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.w-icon{width:56px;height:56px;border-radius:16px;background:var(--green-bg);border:1px solid rgba(34,197,94,.15);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.w-icon svg{width:28px;height:28px;color:var(--green)}
.w-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.w-sub{font-size:14px;color:var(--text2);max-width:400px;margin-bottom:32px;line-height:1.6}
.examples{display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px}
.ex{font-size:13.5px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:.2s;text-align:left;line-height:1.5}
.ex:hover{border-color:var(--green);color:var(--text);background:var(--bg3)}

/* ── MESSAGES ── */
.msg{margin-bottom:24px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-user{display:flex;justify-content:flex-end}
.msg-user-text{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 4px var(--radius);padding:12px 16px;max-width:85%;font-size:14px;color:var(--text);line-height:1.6}
.msg-ai{display:flex;flex-direction:column;gap:12px}
.ai-content{font-size:14.5px;line-height:1.75;color:var(--text)}
.ai-content p{margin-bottom:12px}
.ai-content p:last-child{margin-bottom:0}
.ai-content strong{color:#fff;font-weight:600}
.ai-content a{color:var(--blue);text-decoration:none}
.ai-content a:hover{text-decoration:underline}

/* Grade badge inline */
.grade-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.grade-badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;letter-spacing:.3px}
.grade-a{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.grade-b{background:rgba(245,158,11,.08);color:var(--orange);border:1px solid rgba(245,158,11,.2)}
.grade-c{background:rgba(245,158,11,.1);color:var(--orange);border:1px solid rgba(245,158,11,.25)}
.grade-d{background:var(--red-bg);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.grade-f{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.grade-score{font-family:var(--mono);font-size:12px;color:var(--text2)}

/* Analysis expandable */
.analysis-toggle{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;padding:4px 0;transition:.15s;border:none;background:none;margin-top:2px}
.analysis-toggle:hover{color:var(--text2)}
.analysis-panel{display:none;margin-top:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;overflow:hidden}
.analysis-panel.open{display:block}

/* R-bars */
.r-bar{display:flex;align-items:center;gap:8px;height:28px}
.r-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);width:28px;flex-shrink:0}
.r-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.r-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.r-fill.good{background:var(--green)}
.r-fill.mid{background:var(--orange)}
.r-fill.bad{background:var(--red)}
.r-val{font-family:var(--mono);font-size:10px;color:var(--text2);width:32px;text-align:right;flex-shrink:0}
.r-signal{display:flex;align-items:center;gap:6px;height:24px;font-family:var(--mono);font-size:10px}
.r-signal.ok{color:var(--green)}
.r-signal.warn{color:var(--orange)}
.r-foot{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text3)}
.r-foot a{color:var(--green);text-decoration:none}

/* Compare panels */
.cmp-wrap{margin-bottom:24px;animation:fadeUp .3s ease}
.cmp-q{text-align:center;margin-bottom:14px;font-size:14px;color:var(--text2)}
.cmp-q strong{color:var(--text);font-weight:600}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.cmp-grid{grid-template-columns:1fr}}
.cmp-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cmp-panel.raw{border-top:3px solid var(--red)}
.cmp-panel.gold{border-top:3px solid var(--green)}
.cmp-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.cmp-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.cmp-panel.raw .cmp-label{color:var(--red)}
.cmp-panel.gold .cmp-label{color:var(--green)}
.cmp-body{padding:14px;font-size:13px;line-height:1.75;color:var(--text2);max-height:400px;overflow-y:auto}
.cmp-body p{margin-bottom:10px}
.cmp-body p:last-child{margin-bottom:0}
.cmp-body strong{color:var(--text);font-weight:600}
.cmp-bars{padding:4px 14px 8px}
.cmp-detail-btn{display:flex;align-items:center;justify-content:center;padding:8px;border-top:1px solid var(--border);cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text3);transition:.15s}
.cmp-detail-btn:hover{color:var(--text2);background:var(--bg3)}
.cmp-detail{display:none;padding:10px 14px;border-top:1px solid var(--border)}
.cmp-detail.open{display:block}
.cmp-mets{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.cmet{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;text-align:center;min-width:80px}
.cmet-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--green);margin-bottom:2px}
.cmet-lbl{font-size:10px;color:var(--text3);letter-spacing:.3px}

/* Loader dots */
.dots{display:inline-flex;gap:4px;padding:8px 0}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 1.2s ease-in-out infinite}
.dots i:nth-child(2){animation-delay:.15s}
.dots i:nth-child(3){animation-delay:.3s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.dots-r i{background:var(--red)}

.msg-err{background:var(--red-bg);border:1px solid rgba(239,68,68,.15);border-radius:10px;padding:12px 16px;color:#f87171;font-size:13px}

/* ── INPUT AREA ── */
.input-area{padding:12px 20px 16px;border-top:1px solid var(--border);flex-shrink:0;background:rgba(10,10,10,.92);backdrop-filter:blur(16px)}
.input-wrap{max-width:var(--max);margin:0 auto;display:flex;align-items:flex-end;gap:8px}
.input-box{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius);font-family:var(--sans);font-size:14px;outline:none;resize:none;line-height:1.5;min-height:46px;max-height:160px;transition:border-color .15s;color-scheme:dark}
.input-box:focus{border-color:var(--green)}
.input-box::placeholder{color:var(--text3)}
.btn-send{width:46px;height:46px;border-radius:var(--radius);background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.btn-send:hover{background:var(--green-d)}
.btn-send:disabled{background:var(--bg4);cursor:not-allowed}
.btn-send svg{width:18px;height:18px;color:#fff}
.btn-cmp{height:46px;padding:0 14px;border-radius:var(--radius);background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;transition:.2s;flex-shrink:0;letter-spacing:.3px}
.btn-cmp:hover{border-color:var(--green);color:var(--green)}
.btn-cmp:disabled{opacity:.3;cursor:not-allowed}
.btn-stop{height:46px;padding:0 14px;border-radius:var(--radius);background:var(--red);border:none;color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;display:none;flex-shrink:0}
.btn-stop.vis{display:flex;align-items:center}
.input-meta{max-width:var(--max);margin:4px auto 0;display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3)}

/* ── SETTINGS MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:400px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:var(--sans);font-size:13px;outline:none;color-scheme:dark}
.modal-field input:focus,.modal-field select:focus{border-color:var(--green)}
.modal-row{display:flex;gap:10px;align-items:center;margin-top:16px}
.modal-close{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer}
.modal-close:hover{background:var(--bg3)}
.mode-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text2)}
.mode-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--orange)}
.mode-pill.live .dot{background:var(--green)}

/* ── MENU DROPDOWN ── */
.menu-wrap{position:relative}
.menu-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:170px;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.menu-dropdown.open{display:block}
.menu-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--text2);cursor:pointer;text-decoration:none;transition:.1s}
.menu-item:hover{background:var(--bg3);color:var(--text)}
.menu-item svg{width:14px;height:14px;opacity:.6;flex-shrink:0}
.menu-divider{height:1px;background:var(--border);margin:4px 0}

/* ── R-MODULE TOGGLES ── */
.r-toggles{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.r-toggles-hdr{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.r-toggles-hdr span{cursor:pointer;color:var(--green);font-size:9px;text-transform:none;letter-spacing:0}
.r-layer{margin-bottom:8px}
.r-layer-title{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px}
.r-grid{display:flex;flex-wrap:wrap;gap:4px}
.r-chip{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text2);transition:.15s;user-select:none}
.r-chip:hover{border-color:var(--border-h)}
.r-chip.on{border-color:var(--green-d);background:var(--green-bg);color:var(--green)}
.r-chip .r-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:.15s}
.r-chip.on .r-dot{background:var(--green)}

/* RTL */
[dir="rtl"] .msg-user{justify-content:flex-start}
[dir="rtl"] .msg-user-text{border-radius:var(--radius) var(--radius) var(--radius) 4px}

@media(max-width:640px){
  header{padding:0 14px}
  .chat-inner{padding:14px}
  .input-area{padding:10px 14px 14px}
  .w-title{font-size:22px}
  .cmp-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <a href="/agent/" class="logo" onclick="if(window.matchMedia('(display-mode: standalone)').matches){event.preventDefault();location.reload()}">
    <svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="white"/><path d="M16 10L20 10L20 26L16 26L16 14L13 14L13 10L16 10Z" fill="#0a0a0a"/></svg>
    ONTO
    <span style="font-family:var(--mono);font-size:9px;font-weight:600;color:var(--green);background:var(--green-bg);border:1px solid rgba(34,197,94,.3);padding:2px 6px;border-radius:4px;letter-spacing:.5px;margin-left:2px">BETA</span>
  </a>
  <div class="hdr-actions">
    <select class="lang-sel" id="uiLang" onchange="switchLang(this.value)">
      <option value="en">EN</option>
      <option value="ru">RU</option>
      <option value="uz">UZ</option>
      <option value="tr">TR</option>
      <option value="ar">AR</option>
    </select>
    <button class="hdr-btn" id="btnNew" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="btnNewLbl">New</span>
    </button>
    <button class="hdr-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="menu-wrap">
      <button class="hdr-btn" onclick="toggleMenu(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="/docs/#how" class="menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          About ONTO
        </a>
        <a href="/docs/#faq" class="menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          FAQ
        </a>
        <a href="/docs/#privacy" class="menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Privacy
        </a>
        <a href="/docs/#terms" class="menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Terms
        </a>
        <div class="menu-divider"></div>
        <a href="mailto:council@ontostandard.org" class="menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Contact
        </a>
        <a href="https://ontostandard.org" target="_blank" class="menu-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ontostandard.org
        </a>
      </div>
    </div>
  </div>
</header>

<div class="chat" id="chat">

const GT = {};

async function reScore(text, question) {
  const gt = GT[question];
  const key = document.getElementById('apiKey').value.trim();
  const body = { output: text, question };
  if (gt) { body.ground_truth = gt.truth; body.domain = gt.domain; }
  try {
    const hdrs = { 'Content-Type': 'application/json' };
    if (key) hdrs['x-api-key'] = key;
    const r = await fetch('https://api.ontostandard.org/v1/evaluate', { method: 'POST', headers: hdrs, body: JSON.stringify(body) });
    if (r.ok) return await r.json();
  } catch {}
  return null;
}

  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n- /g, '<br>• ');
  h = h.replace(/\n/g, '<br>');
  h = h.replace(/(DOI:\s*)(10\.\d{4,}\/\S+)/gi, '$1<a href="https://doi.org/$2" target="_blank">$2</a>');
  return '<p>' + h + '</p>';
}

function getConfig() {
  const key = document.getElementById('apiKey').value.trim();
  const mid = document.getElementById('modelId').value.trim();
  return { key, mid };
}

function setBusy(b) {
  busy = b;
  document.getElementById('btnSend').disabled = b;
  document.getElementById('btnCmp').disabled = b;
  document.getElementById('btnStop').classList.toggle('vis', b);
}

function stop() {
  if (ac) { ac.abort(); ac = null }
  const ld = document.getElementById('ldr'); if (ld) ld.remove();
  setBusy(false);
  document.getElementById('inp').focus();
}

function rmWelcome() { const w = document.getElementById('welcome'); if (w) w.remove() }
function gradeClass(g) { return 'grade-' + (g === 'A' ? 'a' : g === 'B' ? 'b' : g === 'C' ? 'c' : g === 'D' ? 'd' : 'f') }

function rBars(metrics, extra) {
  const rows = [
    { k: 'R1', v: metrics.QD }, { k: 'R2', v: metrics.UM }, { k: 'R3', v: metrics.CP },
    { k: 'R4', v: metrics.SS }, { k: 'R5', v: metrics.VQ }, { k: 'R7', v: metrics.CONF }
  ];
  let html = rows.map(r => {
    const v = r.v != null ? r.v : null;
    const pct = v != null ? Math.round(v * 100) : 0;
    const cls = v >= 0.7 ? 'good' : v >= 0.4 ? 'mid' : 'bad';
    return `<div class="r-bar"><span class="r-label">${r.k}</span><div class="r-track"><div class="r-fill ${cls}" style="width:${pct}%"></div></div><span class="r-val">${v != null ? v.toFixed(2) : '—'}</span></div>`;
  }).join('');
  const enabled = getEnabledR();
  const rNames = {8:'Resolve',9:'Surprise',10:'Self',11:'Integrity',12:'Drive',13:'Empathy',14:'Transmit',15:'Correct',16:'Discover',17:'Consist.',18:'Splicing'};
  if (enabled.length > 0) {
    html += '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:3px">';
    for (let i = 8; i <= 18; i++) {
      const on = enabled.includes(i);
      html += `<span style="font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:${on?'var(--green-bg)':'var(--bg3)'};color:${on?'var(--green)':'var(--text3)'};border:1px solid ${on?'var(--green-d)':'var(--border)'}">R${i}</span>`;
    }
    html += '</div>';
  }
  return html;
}

// ── API CALL ──
async function apiCall(msg, goldOn, hdrs, signal) {
  const { mid } = getConfig();
  const body = { message: msg, model_id: mid, history: [], language: curLang === 'en' ? 'auto' : curLang, depth: 'auto', gold_enabled: goldOn, enabled_r_modules: getEnabledR() };
  const r = await fetch(`${API}/v1/agent/chat`, { method: 'POST', headers: hdrs, body: JSON.stringify(body), signal });
  if (!r.ok) { let e = `Error ${r.status}`; try { e = (await r.json()).detail || e } catch {} throw new Error(e) }
  return r.json();
}

// ── SEND ──
async function send() {
  if (busy) return;
  const msg = document.getElementById('inp').value.trim();
  if (!msg) return;

  if (demoMode) {
    const cached = getCached(msg);
    if (cached) {
      document.getElementById('inp').value = ''; autoH(document.getElementById('inp'));
      rmWelcome();
      addUserMsg(msg);
      addAiMsg(cached.gold);
      scroll();
      return;
    }
    addErr('DEMO: try one of the preset examples, or switch to LIVE in Settings.');
    return;
  }

  const { key, mid } = getConfig();
  if (!mid) { addErr(t('modelReq')); return }
  document.getElementById('inp').value = ''; autoH(document.getElementById('inp'));
  rmWelcome(); addUserMsg(msg);

  setBusy(true);
  ac = new AbortController();
  const ld = document.createElement('div'); ld.className = 'msg msg-ai'; ld.id = 'ldr';
  ld.innerHTML = '<div class="dots"><i></i><i></i><i></i></div>';
  document.getElementById('chatInner').appendChild(ld); scroll();

  const hdrs = { 'Content-Type': 'application/json' };
  if (key) hdrs['x-api-key'] = key;

  try {
    const body = { message: msg, model_id: mid, history: hist.slice(-20), language: curLang === 'en' ? 'auto' : curLang, depth: 'auto', gold_enabled: true, enabled_r_modules: getEnabledR() };
    if (convId) body.conversation_id = convId;
    const r = await fetch(`${API}/v1/agent/chat`, { method: 'POST', headers: hdrs, body: JSON.stringify(body), signal: ac.signal });
    ld.remove();
    if (!r.ok) { let e = `Error ${r.status}`; try { e = (await r.json()).detail || e } catch {} addErr(e); return }
    const data = await r.json();
    addAiMsg(data);
    hist.push({ role: 'user', content: msg });
    hist.push({ role: 'assistant', content: data.response || '' });
    if (data.conversation_id) convId = data.conversation_id;
  } catch (e) { ld.remove(); if (e.name !== 'AbortError') addErr('Error: ' + e.message) }
  finally { ac = null; setBusy(false); document.getElementById('inp').focus() }
}

function addUserMsg(text) {
  const d = document.createElement('div'); d.className = 'msg msg-user';
  d.innerHTML = `<div class="msg-user-text">${esc(text)}</div>`;
  document.getElementById('chatInner').appendChild(d);
}

function addAiMsg(data) {
  const s = data.score || {}, m = s.metrics || {};
  const gr = s.compliance_class || '?', num = s.grade != null ? s.grade : '?';
  const mods = data.modules_loaded || [], proof = data.proof || {};
  const uid = 'a' + Date.now();

  const bars = rBars(m, s);
  const modsH = mods.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${mods.map(x=>`<span style="font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--text3)">${esc(x)}</span>`).join('')}</div>` : '';
  const proofH = proof.hash ? `<div class="r-foot"><span>${proof.hash.substring(0,12)}…</span><a href="${proof.verify_url}" target="_blank">Verify ↗</a></div>` : '';

  const d = document.createElement('div'); d.className = 'msg msg-ai';
  d.innerHTML = `
    <div class="ai-content">${fmt(data.response || '')}</div>
    <div class="grade-row">
      <span class="grade-badge ${gradeClass(gr)}">${gr}</span>
      <span class="grade-score">${num}/10</span>
      <button class="analysis-toggle" onclick="const p=document.getElementById('${uid}');p.classList.toggle('open');this.textContent=p.classList.contains('open')?'${t('collapse')}':'${t('analysis')}'">
        ${t('analysis')} ▼
      </button>
    </div>
    <div class="analysis-panel" id="${uid}">
      ${bars}
      ${modsH}
      ${proofH}
      <div class="r-foot">
        ${data.language ? `<span>${data.language.toUpperCase()}</span>` : ''}
        ${data.remaining_today != null ? `<span>${data.remaining_today} left</span>` : ''}
      </div>
    </div>`;
  document.getElementById('chatInner').appendChild(d); scroll();
  if (data.remaining_today != null) document.getElementById('remLbl').textContent = data.remaining_today + ' left today';
}

// ── COMPARE ──
async function compare() {
  if (busy) return;
  const msg = document.getElementById('inp').value.trim();
  if (!msg) return;
  document.getElementById('inp').value = ''; autoH(document.getElementById('inp'));
  rmWelcome();

  if (demoMode) {
    const cached = getCached(msg);
    if (!cached) { addErr('DEMO: try preset examples or switch to LIVE.'); return }
    const uid = 'c' + Date.now();
    const wrap = document.createElement('div'); wrap.className = 'cmp-wrap';
    wrap.innerHTML = `
      <div class="cmp-q"><strong>${esc(msg)}</strong></div>
      <div class="cmp-grid">
        <div class="cmp-panel raw" id="${uid}_b"></div>
        <div class="cmp-panel gold" id="${uid}_g"></div>
      </div>
      <div class="cmp-mets" id="${uid}_m" style="display:none"></div>`;
    document.getElementById('chatInner').appendChild(wrap);
    setTimeout(() => {
      fillPanel(`${uid}_b`, cached.raw, 'raw');
      fillPanel(`${uid}_g`, cached.gold, 'gold');
      showDelta(uid, cached.raw, cached.gold);
      scroll();
    }, 200);
    return;
  }

  const { key, mid } = getConfig();
  if (!mid) { addErr(t('modelReq')); return }
  setBusy(true); ac = new AbortController();

  const uid = 'c' + Date.now();
  const wrap = document.createElement('div'); wrap.className = 'cmp-wrap';
  wrap.innerHTML = `
    <div class="cmp-q"><strong>${esc(msg)}</strong></div>
    <div class="cmp-grid">
      <div class="cmp-panel raw" id="${uid}_b"><div class="cmp-head"><span class="cmp-label">${t('withoutGold')}</span></div><div class="cmp-body"><div class="dots dots-r"><i></i><i></i><i></i></div></div></div>
      <div class="cmp-panel gold" id="${uid}_g"><div class="cmp-head"><span class="cmp-label">${t('withGold')}</span></div><div class="cmp-body"><div class="dots"><i></i><i></i><i></i></div></div></div>
    </div>
    <div class="cmp-mets" id="${uid}_m" style="display:none"></div>`;
  document.getElementById('chatInner').appendChild(wrap); scroll();

  const hdrs = { 'Content-Type': 'application/json' };
  if (key) hdrs['x-api-key'] = key;

  try {
    const [rawData, goldData] = await Promise.all([
      apiCall(msg, false, hdrs, ac.signal),
      apiCall(msg, true, hdrs, ac.signal)
    ]);
    const [rawCheck, goldCheck] = await Promise.all([reScore(rawData.response||'', msg), reScore(goldData.response||'', msg)]);
    if (rawCheck?.composite_score != null) { const r = rawCheck.rules||{}; rawData.score = { grade: rawCheck.composite_score, compliance_class: rawCheck.compliance_class, risk_score: rawCheck.risk_score, metrics: { QD: r.R1_quantify?.score||0, SS: r.R4_sources?.score||0, UM: r.R2_uncertainty?.score||0, CP: r.R3_counterarguments?.score||0, VQ: r.R5_evidence_grade?.score||0, CONF: r.R7_no_fabrication?.score||0 }}; }
    if (goldCheck?.composite_score != null) { const r = goldCheck.rules||{}; goldData.score = { grade: goldCheck.composite_score, compliance_class: goldCheck.compliance_class, risk_score: goldCheck.risk_score, metrics: { QD: r.R1_quantify?.score||0, SS: r.R4_sources?.score||0, UM: r.R2_uncertainty?.score||0, CP: r.R3_counterarguments?.score||0, VQ: r.R5_evidence_grade?.score||0, CONF: r.R7_no_fabrication?.score||0 }}; }
    fillPanel(`${uid}_b`, rawData, 'raw');
    fillPanel(`${uid}_g`, goldData, 'gold');
    showDelta(uid, rawData, goldData);
    scroll();
  } catch (e) { if (e.name !== 'AbortError') addErr('Error: ' + e.message) }
  finally { ac = null; setBusy(false); document.getElementById('inp').focus() }
}

function fillPanel(id, data, type) {
  const el = document.getElementById(id);
  const s = data.score||{}, m = s.metrics||{};
  const gr = s.compliance_class||'?', num = s.grade!=null?s.grade:'?';
  const uid = id + '_d';
  const rows = [{k:'R1',v:m.QD},{k:'R2',v:m.UM},{k:'R3',v:m.CP},{k:'R4',v:m.SS},{k:'R5',v:m.VQ},{k:'R7',v:m.CONF}];
  const barsHtml = rows.map(r=>{
    const v=r.v!=null?r.v:null,pct=v!=null?Math.round(v*100):0,cls=v>=0.7?'good':v>=0.4?'mid':'bad';
    return `<div class="r-bar"><span class="r-label">${r.k}</span><div class="r-track"><div class="r-fill ${cls}" style="width:${pct}%"></div></div><span class="r-val">${v!=null?v.toFixed(2):'—'}</span></div>`;
  }).join('');

  el.innerHTML = `
    <div class="cmp-head">
      <span class="cmp-label">${type==='raw'?t('withoutGold'):t('withGold')}</span>
      <span class="grade-badge ${gradeClass(gr)}">${gr} ${num}/10</span>
    </div>
    <div class="cmp-body">${fmt(data.response||'')}</div>
    <div class="cmp-bars">${barsHtml}</div>`;
}

function showDelta(uid, raw, gold) {
  const rs = raw.score?.grade, gs = gold.score?.grade;
  if (rs != null && gs != null) {
    const d = gs - rs, pct = rs > 0 ? Math.round((d/rs)*100) : 0;
    const el = document.getElementById(`${uid}_m`);
    el.style.display = 'flex';
    el.innerHTML = `
      <div class="cmet"><div class="cmet-val" style="color:var(--red)">${rs}</div><div class="cmet-lbl">${t('rawScore')}</div></div>
      <div class="cmet"><div class="cmet-val">${gs}</div><div class="cmet-lbl">${t('goldScore')}</div></div>
      <div class="cmet"><div class="cmet-val">${d>0?'+':''}${d.toFixed(1)}</div><div class="cmet-lbl">${t('improvement')}</div></div>
      <div class="cmet"><div class="cmet-val">${pct>0?'+':''}${pct}%</div><div class="cmet-lbl">${t('change')}</div></div>`;
  }
}

function addErr(t) {
  const d = document.createElement('div'); d.className = 'msg';
  d.innerHTML = `<div class="msg-err">${esc(t)}</div>`;
  document.getElementById('chatInner').appendChild(d); scroll();
}

// ── CONFIG ──
const CFG_KEY = 'onto_agent_cfg';
function loadCfg() {
  try {
    const p = new URLSearchParams(location.search);
    if (p.get('key')) document.getElementById('apiKey').value = p.get('key');
    const s = localStorage.getItem(CFG_KEY);
    if (s) {
      const c = JSON.parse(s);
      if (!document.getElementById('apiKey').value && c.k) document.getElementById('apiKey').value = c.k;
      if (c.ui) { document.getElementById('uiLang').value = c.ui; curLang = c.ui; }
      if (c.mid) document.getElementById('modelId').value = c.mid;
      if (c.demo != null) demoMode = c.demo;
    }
    if (p.get('key')) { history.replaceState(null, '', location.pathname); saveCfg() }
  } catch {}
}
function saveCfg() {
  try { localStorage.setItem(CFG_KEY, JSON.stringify({ k: document.getElementById('apiKey').value, ui: curLang, mid: document.getElementById('modelId').value, demo: demoMode })) } catch {}
}
loadCfg();
document.getElementById('apiKey').addEventListener('input', saveCfg);
document.getElementById('modelId').addEventListener('input', saveCfg);

// Init
switchLang(curLang);
const pill = document.getElementById('modePill');
pill.className = 'mode-pill' + (demoMode ? '' : ' live');
document.getElementById('modeLbl').textContent = demoMode ? 'DEMO' : 'LIVE';
document.getElementById('inp').focus();

// PWA
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/agent/sw.js').catch(()=>{}); }
</script>
