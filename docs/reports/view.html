<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONTO вЂ” Report</title>
<meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='17' fill='white'/%3E%3Cpath d='M16 10L20 10L20 26L16 26L16 14L13 14L13 10L16 10Z' fill='%230a0a0a'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root{--bg:#0c0f14;--bg-panel:#121722;--border:#1d2330;--accent:#2ec27e;--text:#e2e8f0;--text-s:#94a3b8;--text-m:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,15,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between}
nav a{color:var(--text-s);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}nav a:hover{color:var(--text)}
.nav-logo{color:var(--text);font-weight:700;font-size:15px;letter-spacing:-.3px;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo svg{width:22px;height:22px}
.nav-links{display:flex;gap:24px}
.wrapper{display:flex;max-width:1200px;margin:0 auto;padding-top:48px}
.toc{position:sticky;top:64px;width:220px;min-width:220px;height:calc(100vh - 64px);overflow-y:auto;padding:24px 16px 24px 24px;border-right:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.toc-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-m);margin-bottom:12px;font-weight:600}
.toc a{display:block;font-size:12px;color:var(--text-m);text-decoration:none;padding:4px 0;border-left:2px solid transparent;padding-left:10px;transition:all .15s;line-height:1.4;margin-bottom:2px}
.toc a:hover{color:var(--text-s)}
.toc a.active{color:var(--accent);border-left-color:var(--accent)}
.toc a.toc-h3{padding-left:22px;font-size:11px}
.content{flex:1;min-width:0;padding:40px 48px 120px}
article{max-width:720px}
article h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;color:var(--text)}
article h2{font-size:18px;font-weight:600;margin:36px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text);scroll-margin-top:72px}
article h3{font-size:15px;font-weight:600;margin:24px 0 8px;color:var(--text-s);scroll-margin-top:72px}
article p{font-size:14px;color:var(--text-s);margin-bottom:14px}
article strong{color:var(--text)}
article em{color:var(--text-s);font-style:italic}
article a{color:var(--accent);text-decoration:none}article a:hover{text-decoration:underline}
article ul,article ol{margin:0 0 14px 24px;font-size:14px;color:var(--text-s)}
article li{margin-bottom:6px;line-height:1.6}
article blockquote{border-left:2px solid var(--accent);padding:12px 16px;margin:14px 0;border-radius:0 4px 4px 0;background:var(--bg-panel)}
article blockquote p{margin:0 0 8px;font-size:13px}article blockquote p:last-child{margin:0}
article table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
article th{background:var(--bg-panel);padding:8px 12px;text-align:left;font-weight:500;border:1px solid var(--border);font-size:12px;color:var(--text-s)}
article td{padding:8px 12px;border:1px solid var(--border);color:var(--text-s)}
article td strong{color:var(--text)}
article code{background:var(--bg-panel);padding:1px 5px;border-radius:3px;font-size:12px;font-family:'JetBrains Mono','SF Mono',Consolas,monospace;color:var(--accent)}
article pre{background:var(--bg-panel);padding:16px;border-radius:4px;overflow-x:auto;margin:14px 0;font-size:12px;line-height:1.5}
article pre code{background:none;padding:0;color:var(--text-s)}
article hr{border:none;border-top:1px solid var(--border);margin:32px 0}
article img{max-width:100%;border-radius:4px;margin:16px 0}
.report-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text-m);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.report-tag{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:3px;color:var(--accent);background:rgba(46,194,126,.1)}
.loading{text-align:center;padding:80px 0;color:var(--text-m);font-size:14px}
@media(max-width:900px){.toc{display:none}.content{padding:24px 20px 80px}}
@media(max-width:640px){article h1{font-size:20px}article h2{font-size:16px}article table{font-size:11px}article th,article td{padding:6px 8px}}
</style>
</head>
<body>

<nav>
<a href="/" class="nav-logo">
<svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="white"/><path d="M16 10L20 10L20 26L16 26L16 14L13 14L13 10L16 10Z" fill="#0a0a0a"/></svg>
ONTO
</a>
<div class="nav-links">
<a href="/reports/">Reports</a>
<a href="/docs/">Docs</a>
<a href="/paper/">Paper</a>
<a href="/app/">Portal</a>
</div>
</nav>

<div class="wrapper">
<aside class="toc" id="toc"></aside>
<main class="content">
<div id="meta-bar"></div>
<article id="content">
<div class="loading">Loading report...</div>
</article>
</main>
</div>

<script>
// Report registry вЂ” add new reports here, MD file goes in same folder
const REPORT_REGISTRY = {
    "F-001": { title: "Grok vs Grok+GOLD: AGI within 10 years?", type: "Efficiency Report", date: "2026-03-03", file: "F-001_Grok_AGI.md" },
    "FO-2026-003": { title: "Spontaneous Ontological Demand", type: "Field Observation", date: "2026-02-19", file: "FO-2026-003.md" },
    "IR-2026-001": { title: "Independent Review: ONTO Standard Validation", type: "Independent Review", date: "2026-03-03", file: "IR-2026-001.md" }
};

(async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const target = document.getElementById('content');
    const metaBar = document.getElementById('meta-bar');
    const tocEl = document.getElementById('toc');

    if (!id || !REPORT_REGISTRY[id]) {
        target.innerHTML = '<p style="color:var(--text-m)">Report not found. <a href="/reports/">в†ђ Back to reports</a></p>';
        document.title = 'ONTO вЂ” Report Not Found';
        return;
    }

    const report = REPORT_REGISTRY[id];
    document.title = `${id} вЂ” ${report.title}`;

    // Update meta description
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = `${report.title}. ONTO ${report.type}. ${id}.`;

    // Show meta bar
    metaBar.innerHTML = `
        <div class="report-meta">
            <span class="report-tag">${report.type}</span>
            <span>${id}</span>
            <span>В·</span>
            <span>${report.date}</span>
        </div>
    `;

    try {
        const res = await fetch(report.file);
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();

        marked.setOptions({ gfm: true, breaks: false, headerIds: true });
        target.innerHTML = marked.parse(md);

        // Build TOC
        const headings = target.querySelectorAll('h1, h2, h3');
        let tocHTML = '<div class="toc-title">Contents</div>';

        headings.forEach((h) => {
            const slug = h.textContent.toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, '-')
                .substring(0, 60);
            h.id = slug;

            if (h.tagName === 'H2') {
                tocHTML += `<a href="#${slug}">${h.textContent}</a>`;
            } else if (h.tagName === 'H3') {
                tocHTML += `<a href="#${slug}" class="toc-h3">${h.textContent}</a>`;
            }
        });

        tocEl.innerHTML = tocHTML;

        // Active TOC tracking
        const tocLinks = tocEl.querySelectorAll('a');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    tocLinks.forEach(l => l.classList.remove('active'));
                    const active = tocEl.querySelector(`a[href="#${entry.target.id}"]`);
                    if (active) active.classList.add('active');
                }
            });
        }, { rootMargin: '-80px 0px -70% 0px' });

        headings.forEach(h => { if (h.id) observer.observe(h); });

    } catch (err) {
        target.innerHTML = `<p style="color:var(--text-m)">Failed to load report. <a href="/reports/">в†ђ Back to reports</a></p>`;
    }
})();
</script>
</body>
</html>
