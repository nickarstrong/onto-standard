<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - ONTO Standard</title>
<meta name="description" content="Field observations, comparative studies, and efficiency measurements across production AI models. All data reproducible.">
<style>
  :root {
    --bg: #0c0f14;
    --panel: #121722;
    --border: #1d2330;
    --accent: #2ec27e;
    --text: #e0e0e0;
    --dim: #7a7a7a;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Nav ── */
  .nav {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 32px;
  }
  .nav a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.15s;
  }
  .nav a:hover { color: var(--accent); }
  .nav span { color: var(--dim); margin: 0 6px; }

  /* ── Header ── */
  h1 {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--dim);
    font-size: 15px;
    margin-bottom: 32px;
    max-width: 600px;
  }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .stats strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Reports list ── */
  .reports {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .report-card {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .report-card:hover {
    border-color: var(--accent);
    background: #151c28;
  }

  .badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 4px 8px;
    border-radius: 4px;
    text-align: center;
    min-width: 36px;
    line-height: 1;
  }
  .badge-id {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--dim);
    display: block;
    margin-top: 3px;
    text-align: center;
  }

  /* Badge colors by type */
  .type-F   .badge { background: #1e3a5f; color: #6db3f2; }
  .type-FO  .badge { background: #3d2e0a; color: #e8a838; }
  .type-IR  .badge { background: #0e3324; color: #2ec27e; }
  .type-CS  .badge { background: #1a2d1a; color: #4caf50; }
  .type-ER  .badge { background: #3a1a1a; color: #e06060; }
  .type-DS  .badge { background: #2a1a3a; color: #b080d0; }
  .type-MB  .badge { background: #2a1a3a; color: #b080d0; }

  .report-info { flex: 1; min-width: 0; }

  .report-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .report-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--dim);
  }

  .report-date {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
    white-space: nowrap;
  }

  /* ── Loading / Error ── */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 13px;
  }
  .loading .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 40px;
    color: #e06060;
    font-family: var(--mono);
    font-size: 13px;
  }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  footer a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.15s;
  }
  footer a:hover { color: var(--accent); }
  footer .sep { color: #333; }

  @media (max-width: 600px) {
    .container { padding: 24px 16px 60px; }
    h1 { font-size: 24px; }
    .stats { gap: 16px; flex-wrap: wrap; }
    .report-card { padding: 16px; gap: 14px; }
    .report-date { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <a href="/">ONTO</a>
    <span>/</span>
    <span>Reports</span>
  </nav>

  <h1>Reports</h1>
  <p class="subtitle">Field observations, comparative studies, and efficiency measurements across production AI models. All data reproducible.</p>

  <div class="stats" id="stats"></div>

  <div class="reports" id="reports">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading reports...</div>
    </div>
  </div>

  <footer>
    <a href="/">ontostandard.org</a>
    <span class="sep">|</span>
    <a href="/paper/">Documentation</a>
    <span class="sep">|</span>
    <a href="https://github.com/nickarstrong/onto-standard" target="_blank">GitHub</a>
    <span class="sep">|</span>
    <span>Cite as: ONTO Standard, {report_id}</span>
  </footer>
</div>

<script>
const CONFIG = {
  owner: 'nickarstrong',
  repo: 'onto-standard',
  path: 'docs/reports',
  branch: 'main'
};

const TYPE_LABELS = {
  'F':  'Finding',
  'FO': 'Field Observation',
  'IR': 'Independent Review',
  'CS': 'Comparative Study',
  'ER': 'Efficiency Report',
  'DS': 'Dataset',
  'MB': 'Model Baseline'
};

function parseReportType(folderName) {
  // F-001, FO-2026-003, IR-2026-001, CS-2026-001, etc.
  const m = folderName.match(/^([A-Z]+)-/);
  return m ? m[1] : 'F';
}

function parseTypeLabel(type) {
  return TYPE_LABELS[type] || type;
}

function githubFolderUrl(folderName) {
  return `https://github.com/${CONFIG.owner}/${CONFIG.repo}/tree/${CONFIG.branch}/${CONFIG.path}/${folderName}`;
}

function rawUrl(folderName, file) {
  return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${CONFIG.path}/${folderName}/${file}`;
}

async function fetchReadmeHeader(folderName) {
  try {
    const res = await fetch(rawUrl(folderName, 'README.md'));
    if (!res.ok) return { title: folderName, date: '' };
    const text = await res.text();
    const lines = text.split('\n').slice(0, 10);

    // Title: first # heading
    let title = folderName;
    for (const line of lines) {
      const m = line.match(/^#\s+(.+)/);
      if (m) { title = m[1].trim(); break; }
    }

    // Date: **Date:** YYYY-MM-DD or similar
    let date = '';
    for (const line of lines) {
      const m = line.match(/\*\*Date:\*\*\s*(\d{4}-\d{2}-\d{2})/);
      if (m) { date = m[1]; break; }
    }

    // Category/models from meta lines
    let meta = '';
    for (const line of lines) {
      const m = line.match(/\*\*Category:\*\*\s*(.+)/);
      if (m) { meta = m[1].trim(); break; }
    }

    return { title, date, meta };
  } catch {
    return { title: folderName, date: '' };
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderCard(folderName, info) {
  const type = parseReportType(folderName);
  const card = document.createElement('a');
  card.className = `report-card type-${type}`;
  card.href = githubFolderUrl(folderName);
  card.target = '_blank';
  card.rel = 'noopener';

  card.innerHTML = `
    <div>
      <div class="badge">${type}</div>
      <div class="badge-id">${folderName}</div>
    </div>
    <div class="report-info">
      <div class="report-title">${info.title}</div>
      ${info.meta ? `<div class="report-meta">${info.meta}</div>` : ''}
    </div>
    <div class="report-date">${formatDate(info.date)}</div>
  `;

  return card;
}

async function loadReports() {
  const container = document.getElementById('reports');
  const statsEl = document.getElementById('stats');

  try {
    const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
    const res = await fetch(apiUrl);

    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);

    const items = await res.json();
    const folders = items
      .filter(item => item.type === 'dir')
      .map(item => item.name)
      .sort((a, b) => {
        // Sort by date in name if present, otherwise alphabetically
        return a.localeCompare(b);
      });

    if (folders.length === 0) {
      container.innerHTML = '<div class="loading">No reports found.</div>';
      return;
    }

    // Fetch all README headers in parallel
    const infos = await Promise.all(
      folders.map(f => fetchReadmeHeader(f))
    );

    // Sort by date descending (newest first)
    const paired = folders.map((f, i) => ({ folder: f, info: infos[i] }));
    paired.sort((a, b) => (b.info.date || '').localeCompare(a.info.date || ''));

    // Stats
    statsEl.innerHTML = `<span><strong>${paired.length}</strong> reports</span>`;

    // Render
    container.innerHTML = '';
    for (const { folder, info } of paired) {
      container.appendChild(renderCard(folder, info));
    }

  } catch (err) {
    container.innerHTML = `
      <div class="error">
        Failed to load reports: ${err.message}<br>
        <a href="https://github.com/${CONFIG.owner}/${CONFIG.repo}/tree/${CONFIG.branch}/${CONFIG.path}" 
           target="_blank" style="color: var(--accent);">
          View on GitHub directly
        </a>
      </div>`;
  }
}

loadReports();
</script>

</body>
</html>
