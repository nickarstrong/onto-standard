<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONTO Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --bg:#0a0a0a; --card:#18181b; --border:#27272a; --bg2:#0f0f10;
    --text:#e4e4e7; --muted:#a1a1aa; --accent:#22c55e;
    --user:#2563eb; --gold:#22c55e; --raw:#b45309; --danger:#dc2626;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --font:Inter,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;display:flex;flex-direction:column;overflow:hidden}

  header{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:8px}
  .dot{width:18px;height:18px;border-radius:50%;background:var(--accent)}
  .brand{font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:2px}
  .meta{margin-left:auto;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;flex-wrap:wrap}
  select.sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;border-radius:3px;outline:none;cursor:pointer;letter-spacing:.5px}
  select.sel:hover{border-color:var(--accent)}
  .toggle{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none}
  .toggle.on{border-color:var(--accent);color:var(--accent)}
  .toggle.on .led{background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .led{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .status{display:flex;align-items:center;gap:6px}
  .status .pulse{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:.2s}
  .status.ok .pulse{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .status.err .pulse{background:var(--danger)}
  button.icon{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:3px;font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer;text-transform:uppercase}
  button.icon:hover{border-color:var(--accent);color:var(--accent)}

  main{flex:1;overflow-y:auto;padding:24px 20px;max-width:1100px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px}
  main:empty::after{content:'Send a message · Drop files anywhere · Click VS for RAW vs GOLD compare.';color:var(--muted);text-align:center;display:block;margin-top:80px;font-style:italic}

  .msg{display:flex;flex-direction:column;gap:6px;animation:fade .15s ease-out}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .role{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
  .msg.user .role{color:var(--user)}
  .msg.assistant .role{color:var(--accent)}
  .msg.error .role{color:var(--danger)}
  .body{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:14px 16px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
  .msg.user .body{border-left:2px solid var(--user)}
  .msg.assistant .body{border-left:2px solid var(--accent)}
  .msg.error .body{border-left:2px solid var(--danger);color:var(--danger)}
  .files-tag{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .file-tag{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:4px 8px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.5px}

  /* Score panel */
  .score{margin-top:10px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:12px}
  .score-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .grade{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:3px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px}
  .grade.A{background:#15803d;color:#fff}
  .grade.B{background:#22c55e;color:#000}
  .grade.C{background:#b45309;color:#fff}
  .grade.D{background:#dc2626;color:#fff}
  .grade.F{background:#7f1d1d;color:#fff}
  .score-meta{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.5px}
  .bars{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .bar{display:flex;flex-direction:column;gap:3px}
  .bar-head{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.5px}
  .bar-head .k{color:var(--muted);font-weight:700}
  .bar-head .v{color:var(--text)}
  .bar-track{height:4px;background:var(--card);border-radius:2px;overflow:hidden}
  .bar-fill{height:100%;background:var(--accent);transition:width .3s}
  .bar.low .bar-fill{background:var(--danger)}
  .bar.mid .bar-fill{background:var(--raw)}
  .indicators{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .ind{font-family:var(--mono);font-size:10px;padding:3px 6px;border-radius:3px;background:var(--card);border:1px solid var(--border);color:var(--muted);letter-spacing:.5px}
  .ind.r17{border-color:var(--raw);color:var(--raw)}
  .ind.r18{border-color:var(--accent);color:var(--accent)}
  .apoptosis{margin-top:8px;background:#7f1d1d;border:1px solid var(--danger);border-radius:3px;padding:8px 10px;font-family:var(--mono);font-size:11px;color:#fff;letter-spacing:.5px}

  /* VS compare */
  .vs{display:flex;flex-direction:column;gap:6px;animation:fade .15s ease-out}
  .vs-q{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px}
  .vs-q strong{color:var(--text);font-weight:600}
  .vs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media (max-width:760px){.vs-grid{grid-template-columns:1fr}}
  .vs-panel{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:14px}
  .vs-panel.raw{border-left:2px solid var(--raw)}
  .vs-panel.gold{border-left:2px solid var(--gold)}
  .vs-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .vs-panel.raw .vs-label{color:var(--raw)}
  .vs-panel.gold .vs-label{color:var(--gold)}
  .vs-text{line-height:1.6;white-space:pre-wrap;word-wrap:break-word;margin-bottom:8px}
  .vs-delta{margin-top:8px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px;padding:6px;background:var(--bg2);border-radius:3px}
  .vs-delta strong{color:var(--accent)}
  .vs-delta.neg strong{color:var(--danger)}

  /* Loading dots */
  .dots{display:inline-flex;gap:4px;align-items:center;color:var(--muted)}
  .dots i{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.2s infinite ease-in-out}
  .dots i:nth-child(2){animation-delay:.15s}
  .dots i:nth-child(3){animation-delay:.3s}
  @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

  footer{background:var(--card);border-top:1px solid var(--border);padding:12px 20px}
  .pre-input{max-width:1100px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:5px 8px 5px 10px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text)}
  .chip .name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .size{color:var(--muted);font-size:10px}
  .chip .x{cursor:pointer;color:var(--muted);padding:0 4px;border-radius:2px}
  .chip .x:hover{color:var(--danger);background:var(--card)}
  .chip.parsing{border-color:var(--accent);color:var(--accent)}
  .chip.error{border-color:var(--danger);color:var(--danger)}

  .input-wrap{max-width:1100px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
  .clip{height:48px;width:48px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .clip:hover{border-color:var(--accent);color:var(--accent)}
  .clip svg{width:18px;height:18px}
  textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--font);font-size:14px;padding:12px;resize:none;min-height:48px;max-height:200px;outline:none;line-height:1.5}
  textarea:focus{border-color:var(--accent)}
  .btn{height:48px;padding:0 16px;border-radius:3px;border:none;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;flex-shrink:0}
  .send{background:var(--accent);color:#000}
  .vs-btn{background:transparent;border:1px solid var(--accent);color:var(--accent)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .hint{max-width:1100px;margin:6px auto 0;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  #drop-overlay{position:fixed;inset:0;background:rgba(34,197,94,.08);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:100;pointer-events:none}
  #drop-overlay.active{display:flex}
  #drop-overlay span{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase}

  /* API key warning banner */
  .auth-banner{background:#7f1d1d;border-bottom:1px solid var(--danger);padding:8px 20px;font-family:var(--mono);font-size:11px;color:#fff;letter-spacing:.5px;text-align:center}
  .auth-banner a{color:#fff;text-decoration:underline}
</style>
</head>
<body>

<div id="auth-banner" class="auth-banner" style="display:none">
  No ONTO API key found · 5 req/day public limit · <a href="/app/" target="_blank">Sign in to /app/</a> for higher tier
</div>

<header>
  <div class="logo"><span class="dot"></span><span class="brand">ONTO LAB</span></div>
  <div class="meta">
    <select class="sel" id="model-sel" title="Active model"></select>
    <span class="toggle on" id="gold-toggle" onclick="toggleGold()" title="GOLD discipline ON/OFF (single Send)">
      <span class="led"></span><span id="gold-label">GOLD ON</span>
    </span>
    <select class="sel" id="mode-sel" title="Mode">
      <option value="experimenter">Experimenter</option>
      <option value="agent">Agent</option>
    </select>
    <span class="status" id="status"><span class="pulse"></span><span id="status-text">checking</span></span>
    <button class="icon" onclick="clearChat()">Clear</button>
  </div>
</header>

<main id="chat"></main>

<footer>
  <div class="pre-input" id="chips"></div>
  <div class="input-wrap">
    <button class="clip" onclick="document.getElementById('file-input').click()" title="Attach file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <input type="file" id="file-input" multiple accept=".txt,.md,.json,.csv,.tsv,.py,.js,.ts,.html,.css,.yaml,.yml,.xml,.log,.pdf,.docx" style="display:none">
    <textarea id="input" placeholder="Спроси Qwen с дисциплиной R1-R18… (Enter to send · Shift+Enter for newline)" rows="2"></textarea>
    <button class="btn vs-btn" id="vs-btn" onclick="vsCompare()" title="RAW vs GOLD parallel">VS</button>
    <button class="btn send" id="send" onclick="send()">Send</button>
  </div>
  <div class="hint">
    <span id="msg-count">0 messages</span>
    <span id="last-stats"></span>
    <span id="quota">— /day remaining</span>
  </div>
</footer>

<div id="drop-overlay"><span>Drop to attach</span></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const NGROK = 'https://pamphlet-whimsical-armed.ngrok-free.dev/v1';
const ONTO_API = 'https://api.ontostandard.org';
const STORAGE_KEY = 'onto_lab_history';
const MODEL_KEY = 'onto_lab_model';
const GOLD_KEY = 'onto_lab_gold';
const MODE_KEY = 'onto_lab_mode';
const MAX_FILE_CHARS = 80000;

if (window['pdfjsLib']) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ── DOM ─────────────────────────────────────────────────────────────────
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const vsBtn = document.getElementById('vs-btn');
const statusEl = document.getElementById('status');
const statusTxt = document.getElementById('status-text');
const modelSel = document.getElementById('model-sel');
const modeSel = document.getElementById('mode-sel');
const goldToggle = document.getElementById('gold-toggle');
const goldLabel = document.getElementById('gold-label');
const chipsEl = document.getElementById('chips');
const fileInput = document.getElementById('file-input');
const dropOverlay = document.getElementById('drop-overlay');
const authBanner = document.getElementById('auth-banner');

// ── STATE ───────────────────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let attached = [];
let goldOn = localStorage.getItem(GOLD_KEY) !== '0';
modeSel.value = localStorage.getItem(MODE_KEY) || 'experimenter';
modeSel.addEventListener('change', () => localStorage.setItem(MODE_KEY, modeSel.value));

function getApiKey(){ return localStorage.getItem('onto_first_api_key') || ''; }
function refreshAuthBanner(){ authBanner.style.display = getApiKey() ? 'none' : 'block'; }

// ── PERSIST ─────────────────────────────────────────────────────────────
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); updateCount(); }
function updateCount(){ document.getElementById('msg-count').textContent = history.length + ' messages'; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── GOLD TOGGLE ─────────────────────────────────────────────────────────
function setGold(on){
  goldOn = on;
  localStorage.setItem(GOLD_KEY, on ? '1' : '0');
  goldToggle.classList.toggle('on', on);
  goldLabel.textContent = on ? 'GOLD ON' : 'GOLD OFF';
}
function toggleGold(){ setGold(!goldOn); }
setGold(goldOn);

// ── RENDER ──────────────────────────────────────────────────────────────
function render(){
  chat.innerHTML = '';
  history.forEach(h => {
    if (h.kind === 'vs'){
      renderVsBlock(h, false);
    } else {
      renderMsg(h, false);
    }
  });
  chat.scrollTop = chat.scrollHeight;
}

function renderMsg(h, push=true){
  const div = document.createElement('div');
  div.className = 'msg ' + h.role;
  let filesHtml = '';
  if (h.files && h.files.length){
    filesHtml = '<div class="files-tag">' + h.files.map(f => `<span class="file-tag">📎 ${escapeHtml(f)}</span>`).join('') + '</div>';
  }
  const goldTag = h.role === 'assistant' && h.gold !== undefined
    ? `<span style="color:${h.gold ? 'var(--gold)' : 'var(--raw)'}">${h.gold ? 'GOLD' : 'RAW'}</span>`
    : '';
  div.innerHTML = `<div class="role"><span>${h.role}</span>${goldTag}</div><div class="body">${filesHtml}<span class="text"></span></div>`;
  div.querySelector('.text').textContent = h.content;
  if (h.score) div.querySelector('.body').appendChild(buildScore(h.score, h.apoptosis));
  chat.appendChild(div);
  if (push){ history.push(h); save(); }
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function buildScore(score, apoptosis){
  const wrap = document.createElement('div');
  wrap.className = 'score';
  const cls = score.compliance_class || '?';
  const grade = score.grade != null ? score.grade : '?';
  let html = `<div class="score-head">
    <span class="grade ${cls}">Grade ${cls} · ${grade}/10</span>
    <span class="score-meta">R1-R7 measured · R17/R18 embedded</span>
  </div>`;

  const m = score.metrics || {};
  const rk = ['R1','R2','R3','R4','R5','R6','R7'].filter(k => m[k] != null);
  if (rk.length){
    html += '<div class="bars">';
    for (const k of rk){
      const v = m[k];
      const cls = v < 0.3 ? 'low' : v < 0.6 ? 'mid' : '';
      html += `<div class="bar ${cls}"><div class="bar-head"><span class="k">${k}</span><span class="v">${(v*100).toFixed(0)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v*100).toFixed(0)}%"></div></div></div>`;
    }
    html += '</div>';
  }

  const flags = score.r17_flags || [];
  const ir = score.r18_intron_ratio || 0;
  const ic = score.r18_intron_count || 0;
  if (flags.length || ir > 0.3){
    html += '<div class="indicators">';
    flags.forEach(f => {
      html += `<span class="ind r17">${escapeHtml(f.slice(0,60))}</span>`;
    });
    if (ir > 0.3){
      html += `<span class="ind r18">R18 · ${ic} intron${ic===1?'':'s'} · ${(ir*100).toFixed(0)}%</span>`;
    }
    html += '</div>';
  }

  if (apoptosis && apoptosis.triggered){
    html += `<div class="apoptosis">⚠ APOPTOSIS · ${escapeHtml(apoptosis.reason || 'C8 frameshift')}</div>`;
  }

  wrap.innerHTML = html;
  return wrap;
}

function clearChat(){
  if (!confirm('Clear all history?')) return;
  history = []; save(); render();
}

// ── MODELS / HEALTH ─────────────────────────────────────────────────────
async function loadModels(){
  try {
    const r = await fetch(NGROK + '/models', { headers: {'ngrok-skip-browser-warning':'true'} });
    if (!r.ok) throw new Error();
    const j = await r.json();
    const models = (j.data || []).map(m => m.id).sort();
    modelSel.innerHTML = '';
    models.forEach(id => {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = id;
      modelSel.appendChild(opt);
    });
    const saved = localStorage.getItem(MODEL_KEY);
    if (saved && models.includes(saved)) modelSel.value = saved;
    else if (models.length) localStorage.setItem(MODEL_KEY, modelSel.value);
    statusEl.className = 'status ok';
    statusTxt.textContent = 'online';
  } catch {
    modelSel.innerHTML = '<option>—</option>';
    statusEl.className = 'status err';
    statusTxt.textContent = 'offline';
  }
}
modelSel.addEventListener('change', () => localStorage.setItem(MODEL_KEY, modelSel.value));

// ── FILES ───────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => {
  for (const f of e.target.files) attachFile(f);
  fileInput.value = '';
});

function renderChips(){
  chipsEl.innerHTML = '';
  attached.forEach((a, i) => {
    const ch = document.createElement('div');
    ch.className = 'chip' + (a.parsing ? ' parsing' : '') + (a.error ? ' error' : '');
    ch.innerHTML = `<span>📎</span><span class="name">${escapeHtml(a.name)}</span><span class="size">${formatSize(a.size)}${a.parsing ? ' · parsing…' : ''}${a.error ? ' · '+escapeHtml(a.error) : ''}</span><span class="x" onclick="removeAttached(${i})">×</span>`;
    chipsEl.appendChild(ch);
  });
}
function removeAttached(i){ attached.splice(i, 1); renderChips(); }
window.removeAttached = removeAttached;

function formatSize(n){
  if (n < 1024) return n + 'B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + 'KB';
  return (n/1024/1024).toFixed(1) + 'MB';
}

async function attachFile(file){
  const entry = { name: file.name, size: file.size, content: '', parsing: true, error: null };
  attached.push(entry);
  renderChips();
  try {
    let txt = '';
    const ext = file.name.toLowerCase().split('.').pop();
    if (ext === 'pdf') txt = await parsePdf(file);
    else if (ext === 'docx') txt = await parseDocx(file);
    else txt = await file.text();
    if (txt.length > MAX_FILE_CHARS) txt = txt.slice(0, MAX_FILE_CHARS) + `\n\n[…truncated · ${txt.length - MAX_FILE_CHARS} more chars]`;
    entry.content = txt;
    entry.parsing = false;
  } catch (e){
    entry.parsing = false; entry.error = 'parse failed';
    console.error('attach', file.name, e);
  }
  renderChips();
}

async function parsePdf(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let out = '';
  for (let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    out += tc.items.map(it => it.str).join(' ') + '\n\n';
  }
  return out.trim();
}

async function parseDocx(file){
  const buf = await file.arrayBuffer();
  const r = await mammoth.extractRawText({arrayBuffer: buf});
  return r.value;
}

// ── DRAG-DROP ───────────────────────────────────────────────────────────
let dragCounter = 0;
window.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; if (e.dataTransfer.types.includes('Files')) dropOverlay.classList.add('active'); });
window.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) dropOverlay.classList.remove('active'); });
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
  for (const f of e.dataTransfer.files) attachFile(f);
});

// ── BUILD MESSAGE ───────────────────────────────────────────────────────
function buildMessage(text){
  let prompt = '';
  for (const a of attached){
    if (a.error) continue;
    prompt += `--- File: ${a.name} ---\n${a.content}\n\n`;
  }
  prompt += text;
  return prompt;
}

function getPriorHistory(){
  // For backend: list of {role, content} excluding kind=vs and current msg
  return history
    .filter(h => h.kind !== 'vs' && (h.role === 'user' || h.role === 'assistant'))
    .slice(-20)
    .map(h => ({role: h.role, content: h.content}));
}

// ── BACKEND CALL ────────────────────────────────────────────────────────
async function callAgent(message, goldEnabled, history_arr){
  const headers = {'Content-Type': 'application/json'};
  const apiKey = getApiKey();
  if (apiKey) headers['x-api-key'] = apiKey;

  const body = {
    message,
    provider_key: 'ollama',
    provider_url: NGROK,
    model_name: modelSel.value,
    gold_enabled: goldEnabled,
    mode: modeSel.value,
    history: history_arr || [],
    language: 'auto'
  };

  const res = await fetch(ONTO_API + '/v1/agent/chat', {
    method: 'POST',
    headers,
    body: JSON.stringify(body)
  });

  if (!res.ok){
    let detail = `HTTP ${res.status}`;
    try { const j = await res.json(); detail = j.detail || detail; } catch {}
    throw new Error(detail);
  }
  return await res.json();
}

// ── SEND (single, current GOLD toggle) ──────────────────────────────────
async function send(){
  const text = input.value.trim();
  if (!text && !attached.length) return;
  if (attached.some(a => a.parsing)){ alert('Wait for file parsing.'); return; }

  const fullPrompt = buildMessage(text);
  const fileNames = attached.filter(a => !a.error).map(a => a.name);

  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true; vsBtn.disabled = true;

  // user msg (display = text only, history stores fullPrompt)
  renderMsg({role:'user', content: text || '(files only)', files: fileNames}, false);
  history.push({role:'user', content: fullPrompt, files: fileNames});
  save();

  attached = []; renderChips();

  // assistant placeholder
  const placeholder = document.createElement('div');
  placeholder.className = 'msg assistant';
  placeholder.innerHTML = `<div class="role"><span>assistant</span><span style="color:${goldOn?'var(--gold)':'var(--raw)'}">${goldOn?'GOLD':'RAW'}</span></div><div class="body"><span class="dots"><i></i><i></i><i></i></span></div>`;
  chat.appendChild(placeholder);
  chat.scrollTop = chat.scrollHeight;

  const t0 = performance.now();
  try {
    const data = await callAgent(fullPrompt, goldOn, getPriorHistory().slice(0, -1));
    placeholder.remove();

    const entry = {
      role:'assistant',
      content: data.response,
      gold: data.gold_enabled,
      score: data.score,
      apoptosis: data.apoptosis
    };
    renderMsg(entry, true);

    const dt = ((performance.now() - t0)/1000).toFixed(1);
    document.getElementById('last-stats').textContent = `${dt}s · ${data.score?.compliance_class || '?'} · ${data.score?.grade || '?'}/10 · ${modelSel.value}`;
    if (data.remaining_today != null) document.getElementById('quota').textContent = `${data.remaining_today}/day remaining`;

  } catch (e){
    placeholder.remove();
    history.pop(); save();
    renderMsg({role:'error', content: 'Backend error: ' + e.message}, true);
  } finally {
    sendBtn.disabled = false; vsBtn.disabled = false; input.focus();
  }
}

// ── VS COMPARE (RAW || GOLD parallel) ───────────────────────────────────
async function vsCompare(){
  const text = input.value.trim();
  if (!text && !attached.length) return;
  if (attached.some(a => a.parsing)){ alert('Wait for file parsing.'); return; }

  const fullPrompt = buildMessage(text);
  const fileNames = attached.filter(a => !a.error).map(a => a.name);

  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true; vsBtn.disabled = true;

  renderMsg({role:'user', content: text || '(files only)', files: fileNames}, false);
  history.push({role:'user', content: fullPrompt, files: fileNames});
  save();

  attached = []; renderChips();

  // VS placeholder
  const wrap = document.createElement('div');
  wrap.className = 'vs';
  const uid = 'vs' + Date.now();
  wrap.innerHTML = `
    <div class="vs-q"><strong>VS · RAW vs GOLD</strong></div>
    <div class="vs-grid">
      <div class="vs-panel raw" id="${uid}_r"><div class="vs-label"><span>RAW</span><span>—</span></div><div class="vs-text"><span class="dots"><i></i><i></i><i></i></span></div></div>
      <div class="vs-panel gold" id="${uid}_g"><div class="vs-label"><span>GOLD</span><span>—</span></div><div class="vs-text"><span class="dots"><i></i><i></i><i></i></span></div></div>
    </div>
    <div class="vs-delta" id="${uid}_d" style="display:none"></div>
  `;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;

  const priorHist = getPriorHistory().slice(0, -1);
  const t0 = performance.now();

  // Parallel
  const [rawR, goldR] = await Promise.allSettled([
    callAgent(fullPrompt, false, priorHist),
    callAgent(fullPrompt, true, priorHist)
  ]);

  fillVsPanel(uid + '_r', rawR, 'raw');
  fillVsPanel(uid + '_g', goldR, 'gold');

  // Delta
  if (rawR.status === 'fulfilled' && goldR.status === 'fulfilled'){
    const dr = rawR.value.score?.grade ?? 0;
    const dg = goldR.value.score?.grade ?? 0;
    const delta = (dg - dr).toFixed(1);
    const cr = rawR.value.score?.compliance_class || '?';
    const cg = goldR.value.score?.compliance_class || '?';
    const deltaEl = document.getElementById(uid + '_d');
    deltaEl.style.display = 'block';
    deltaEl.classList.toggle('neg', delta < 0);
    deltaEl.innerHTML = `Δ Grade <strong>${cr} → ${cg}</strong> · score <strong>${delta > 0 ? '+' : ''}${delta}</strong>`;

    if (goldR.value.remaining_today != null) document.getElementById('quota').textContent = `${goldR.value.remaining_today}/day remaining`;
  }

  const dt = ((performance.now() - t0)/1000).toFixed(1);
  document.getElementById('last-stats').textContent = `VS · ${dt}s · ${modelSel.value}`;

  // Save to history
  history.push({
    kind:'vs',
    raw: rawR.status === 'fulfilled' ? {response: rawR.value.response, score: rawR.value.score, apoptosis: rawR.value.apoptosis} : {error: rawR.reason?.message || 'failed'},
    gold: goldR.status === 'fulfilled' ? {response: goldR.value.response, score: goldR.value.score, apoptosis: goldR.value.apoptosis} : {error: goldR.reason?.message || 'failed'}
  });
  save();

  sendBtn.disabled = false; vsBtn.disabled = false; input.focus();
}

function fillVsPanel(id, settled, kind){
  const el = document.getElementById(id);
  if (settled.status === 'rejected'){
    el.innerHTML = `<div class="vs-label"><span>${kind.toUpperCase()}</span></div><div class="vs-text" style="color:var(--danger)">Error: ${escapeHtml(settled.reason?.message || 'failed')}</div>`;
    return;
  }
  const data = settled.value;
  const score = data.score || {};
  const cls = score.compliance_class || '?';
  const grade = score.grade != null ? score.grade : '?';
  el.innerHTML = `
    <div class="vs-label"><span>${kind === 'raw' ? 'RAW · no GOLD' : 'GOLD · disciplined'}</span><span class="grade ${cls}">${cls} · ${grade}/10</span></div>
    <div class="vs-text"></div>
  `;
  el.querySelector('.vs-text').textContent = data.response;
  el.appendChild(buildScore(score, data.apoptosis));
}

function renderVsBlock(h, push){
  const wrap = document.createElement('div');
  wrap.className = 'vs';
  const uid = 'vs' + Math.random().toString(36).slice(2,8);
  wrap.innerHTML = `
    <div class="vs-q"><strong>VS · RAW vs GOLD</strong></div>
    <div class="vs-grid">
      <div class="vs-panel raw" id="${uid}_r"></div>
      <div class="vs-panel gold" id="${uid}_g"></div>
    </div>
    <div class="vs-delta" id="${uid}_d" style="display:none"></div>
  `;
  chat.appendChild(wrap);

  const fillFromStored = (id, stored, kind) => {
    const el = document.getElementById(id);
    if (stored.error){
      el.innerHTML = `<div class="vs-label"><span>${kind.toUpperCase()}</span></div><div class="vs-text" style="color:var(--danger)">Error: ${escapeHtml(stored.error)}</div>`;
      return;
    }
    const cls = stored.score?.compliance_class || '?';
    const grade = stored.score?.grade != null ? stored.score.grade : '?';
    el.innerHTML = `<div class="vs-label"><span>${kind === 'raw' ? 'RAW · no GOLD' : 'GOLD · disciplined'}</span><span class="grade ${cls}">${cls} · ${grade}/10</span></div><div class="vs-text"></div>`;
    el.querySelector('.vs-text').textContent = stored.response;
    if (stored.score) el.appendChild(buildScore(stored.score, stored.apoptosis));
  };

  fillFromStored(uid + '_r', h.raw, 'raw');
  fillFromStored(uid + '_g', h.gold, 'gold');

  if (!h.raw.error && !h.gold.error){
    const dr = h.raw.score?.grade ?? 0;
    const dg = h.gold.score?.grade ?? 0;
    const delta = (dg - dr).toFixed(1);
    const cr = h.raw.score?.compliance_class || '?';
    const cg = h.gold.score?.compliance_class || '?';
    const deltaEl = document.getElementById(uid + '_d');
    deltaEl.style.display = 'block';
    deltaEl.classList.toggle('neg', delta < 0);
    deltaEl.innerHTML = `Δ Grade <strong>${cr} → ${cg}</strong> · score <strong>${delta > 0 ? '+' : ''}${delta}</strong>`;
  }
}

// ── INPUT ───────────────────────────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

// ── BOOT ────────────────────────────────────────────────────────────────
render();
updateCount();
loadModels();
setInterval(loadModels, 30000);
refreshAuthBanner();
</script>
