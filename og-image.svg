<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Floating formulas (subtle) -->
  <text x="80" y="120" font-family="JetBrains Mono, monospace" font-size="16" fill="#505050" opacity="0.4">U-Recall ≥ 0.30</text>
  <text x="1000" y="80" font-family="JetBrains Mono, monospace" font-size="14" fill="#505050" opacity="0.35">ECE ≤ 0.20</text>
  <text x="60" y="550" font-family="JetBrains Mono, monospace" font-size="14" fill="#505050" opacity="0.3">compliance ∈ {B, S, A}</text>
  <text x="950" y="580" font-family="JetBrains Mono, monospace" font-size="16" fill="#505050" opacity="0.35">P(unknown|unknown) → max</text>
  <text x="100" y="280" font-family="JetBrains Mono, monospace" font-size="13" fill="#505050" opacity="0.25">H(X|Y) ≤ H(X)</text>
  <text x="1020" y="260" font-family="JetBrains Mono, monospace" font-size="13" fill="#505050" opacity="0.3">Ω ⊂ measurable</text>
  
  <!-- Logo circle with 1 -->
  <circle cx="600" cy="180" r="60" fill="white"/>
  <path d="M588 150 L612 150 L612 210 L588 210 L588 170 L578 170 L578 150 L588 150 Z" fill="#0a0a0a"/>
  
  <!-- ONTO text -->
  <text x="600" y="310" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white" text-anchor="middle">ONTO</text>
  
  <!-- Accent line -->
  <rect x="500" y="340" width="200" height="3" rx="1.5" fill="#0066ff"/>
  
  <!-- Tagline -->
  <text x="600" y="390" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#888888" text-anchor="middle">Epistemic Risk Standard</text>
  
  <!-- Subtitle -->
  <text x="600" y="450" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#505050" text-anchor="middle">AI that knows what it doesn't know</text>
  
  <!-- pip install badge -->
  <rect x="440" y="490" width="320" height="44" rx="8" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="460" y="518" font-family="JetBrains Mono, monospace" font-size="16" fill="#505050">$</text>
  <text x="480" y="518" font-family="JetBrains Mono, monospace" font-size="16" fill="white">pip install onto-standard</text>
</svg>
